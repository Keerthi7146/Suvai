<!DOCTYPE html>
<html>
<head>
    <title>Suvai - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-section">
        <div class="overlay">
            <h1>Suvai</h1>
            <p class="main-tagline">Taste That Feels Like Home.</p>
            <p class="sub-tagline">Fresh, Healthy & Delivery With Care.</p>
        </div>
        <img src="images/delivery.png" class="delivery-boy">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-section">
        <div class="login-card">

        <!-- LOGO IMAGE -->
        <div class="logo-container">
            <img src="image/logo.png" alt="Suvai Logo" class="logo-img">
        </div>

        <h2>Login</h2>

            <input type="text" id="username" placeholder="Username / Email">
            
            <div class="password-field">
                <input type="password" id="password" placeholder="Password">
                <span onclick="togglePassword()">👁</span>
            </div>

            <button onclick="login()">Login</button>

            <p class="otp">Login with OTP</p>
            
            <div class="social-login">
                
               <button class="google-btn">
                  <img src="images/google.png" alt="Google">
                  Sign in with Google
           </button>

    <button class="facebook-btn">
        <img src="images/facebook.png" alt="Facebook">
        Sign in with Facebook
    </button>
</div>
            <p id="message"></p>
        </div>
    </div>

</div>

<script src="login.js"></script>
</body>

</html>
