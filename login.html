<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suvai - Login & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            background-color: #ffffff; 
            overflow: hidden; /* NO SCROLLING ALLOWED */
        }

        @keyframes floatAlive {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* --- LEFT PANEL: STRICT 50% WIDTH --- */
        .image-panel {
            width: 50%; 
            height: 100%;
            background: url('image/food.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
        }

        .image-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0.85) 40%, rgba(255,255,255,0) 100%);
        }

        .overlay-content {
            position: relative; 
            z-index: 2;
            max-width: 500px;
            animation: floatAlive 4s ease-in-out infinite; 
        }

        .overlay-logo-text {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fc8019; 
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .overlay-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #282c3f; 
            margin-bottom: 10px;
            line-height: 1.15;
            letter-spacing: -0.5px;
        }

        .overlay-subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            color: #686b78; 
            line-height: 1.4;
        }

        /* --- RIGHT PANEL: STRICT 50% WIDTH --- */
        .form-panel {
            width: 50%; 
            height: 100%;
            background-color: #ffffff; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
        }

        .form-wrapper {
            max-width: 380px; 
            width: 100%;
        }

        /* --- Logo --- */
        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 15px;
        }
        .logo img { height: 42px; width: 42px; border-radius: 50%; object-fit: cover; }
        .logo span { font-size: 24px; font-weight: 800; color: #282c3f; letter-spacing: -0.5px; }

        .header-text h1 {
            font-size: 22px;
            font-weight: 700;
            color: #282c3f;
            margin-bottom: 4px;
            text-align: center;
        }

        .header-text p {
            font-size: 12px;
            color: #686b78;
            margin-bottom: 20px;
            text-align: center;
        }

        /* --- Tabs --- */
        .tab-container {
            display: flex;
            background-color: #f1f3f6;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1; padding: 10px; border: none; background: transparent;
            font-size: 13px; font-weight: 600; color: #686b78;
            border-radius: 6px; cursor: pointer; transition: 0.3s;
        }

        .tab-btn.active {
            background-color: #ffffff; color: #282c3f; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* --- Inputs --- */
        .input-group {
            position: relative; margin-bottom: 15px;
        }

        .input-group label {
            position: absolute; top: -8px; left: 35px; background: #ffffff; 
            padding: 0 5px; font-size: 10px; color: #686b78; font-weight: 600;
        }

        .input-group input {
            width: 100%; padding: 12px 35px; border: 1px solid #d4d5d9;
            border-radius: 8px; font-size: 13px; color: #282c3f;
            outline: none; background-color: #ffffff; transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #fc8019; box-shadow: 0 0 0 3px rgba(252, 128, 25, 0.1);
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none; }

        .input-icon-left {
            position: absolute; top: 50%; left: 12px; transform: translateY(-50%);
            color: #686b78; width: 15px; height: 15px;
        }

        .input-icon-right {
            position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
            color: #686b78; width: 16px; height: 16px; cursor: pointer; transition: 0.3s;
        }
        .input-icon-right:hover { color: #fc8019; }

        /* --- Buttons --- */
        .submit-btn {
            width: 100%; background-color: #fc8019; color: #ffffff; border: none;
            padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 5px;
            box-shadow: 0 4px 12px rgba(252, 128, 25, 0.2);
        }

        .submit-btn:hover {
            background-color: #e06a0b; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(252, 128, 25, 0.3);
        }

        .divider {
            display: flex; align-items: center; text-align: center; margin: 15px 0; color: #93959f; font-size: 11px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eaeaec; }
        .divider span { padding: 0 10px; }

        /* --- Social Login --- */
        .social-login { display: flex; justify-content: center; gap: 15px; }
        .social-btn {
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 1px solid #eaeaec; background-color: #ffffff;
            cursor: pointer; transition: 0.3s;
        }
        .social-btn:hover { transform: translateY(-2px); border-color: #fc8019; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}

        .footer-text { text-align: center; font-size: 10px; color: #93959f; margin-top: 20px; line-height: 1.4; }

        /* --- TOAST NOTIFICATION --- */
        .toast {
            position: fixed; top: 25px; right: -400px;
            background: #282c3f; color: #fff; padding: 14px 22px;
            border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            font-weight: 600; font-size: 13px; display: flex;
            align-items: center; gap: 10px;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        }
        .toast.show { right: 25px; }
        .toast.success { border-left: 5px solid #24963f; }
        .toast.error { border-left: 5px solid #EA4335; }

        /* Default form display setup */
        #signin-form { display: block; }
        #signup-form { display: none; }
    </style>
</head>
<body>

    <div id="toastMessage" class="toast"></div>

    <div class="image-panel">
        <div class="overlay-content">
            <div class="overlay-logo-text">Suvai</div>
            <div class="overlay-title">Taste That Feels Like Home.</div>
            <div class="overlay-subtitle">Fresh, Healthy & Delivery With Care.</div>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-wrapper">
            
            <a href="index.html" class="logo">
                <img src="image/logo.png" alt="Suvai Logo" onerror="this.style.display='none'">
                <span>Suvai</span> 
            </a>

            <div class="header-text">
                <h1 id="form-title">Welcome Back</h1>
                <p id="form-subtitle">Please enter your details to access your account</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="signin-form">
                <div class="input-group">
                    <label>Username</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="in-user" placeholder="Enter your username">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <input type="tel" id="in-phone" placeholder="Enter your phone number">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="in-pass" placeholder="Enter your password">
                    <svg class="input-icon-right toggle-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <button class="submit-btn" id="btn-signin">Sign In</button>
            </div>

            <div id="signup-form">
                <div class="input-group">
                    <label>Username</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="up-user" placeholder="Create a username">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <input type="tel" id="up-phone" placeholder="Enter your phone number">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="up-pass" placeholder="Create a password">
                    <svg class="input-icon-right toggle-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="up-confirm" placeholder="Confirm your password">
                    <svg class="input-icon-right toggle-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <button class="submit-btn" id="btn-signup">Create Account</button>
            </div>

            <div class="divider">
                <span>Or Continue With</span>
            </div>

            <div class="social-login">
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
                        <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                            <path fill="#4285F4" d="M -3.264,51.509 C -3.264,50.719 -3.334,49.969 -3.454,49.239 L -14.754,49.239 L -14.754,53.749 L -8.284,53.749 C -8.574,55.229 -9.424,56.479 -10.684,57.329 L -10.684,60.329 L -6.824,60.329 C -4.564,58.239 -3.264,55.159 -3.264,51.509 z"/>
                            <path fill="#34A853" d="M -14.754,63.239 C -11.514,63.239 -8.804,62.159 -6.824,60.329 L -10.684,57.329 C -11.764,58.049 -13.134,58.489 -14.754,58.489 C -17.884,58.489 -20.534,56.379 -21.484,53.529 L -25.464,53.529 L -25.464,56.619 C -23.494,60.539 -19.444,63.239 -14.754,63.239 z"/>
                            <path fill="#FBBC05" d="M -21.484,53.529 C -21.734,52.809 -21.864,52.039 -21.864,51.239 C -21.864,50.439 -21.724,49.669 -21.484,48.949 L -21.484,45.859 L -25.464,45.859 C -26.284,47.479 -26.754,49.299 -26.754,51.239 C -26.754,53.179 -26.284,54.999 -25.464,56.619 L -21.484,53.529 z"/>
                            <path fill="#EA4335" d="M -14.754,43.989 C -12.984,43.989 -11.404,44.599 -10.154,45.789 L -6.734,41.939 C -8.804,40.009 -11.514,38.989 -14.754,38.989 C -19.444,38.989 -23.494,41.689 -25.464,45.859 L -21.484,48.949 C -20.534,46.099 -17.884,43.989 -14.754,43.989 z"/>
                        </g>
                    </svg>
                </button>
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#282c3f">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </button>
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#1877f2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </button>
            </div>

            <p class="footer-text">
                Join the thousands of food lovers who trust Suvai to manage their daily meals.
            </p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
